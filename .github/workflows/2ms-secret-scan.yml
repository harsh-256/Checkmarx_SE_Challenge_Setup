name: 2ms - Secret Detection

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run 2ms secret scan
        run: |
          mkdir -p artifacts
          docker run --rm -v "$PWD":/repo checkmarx/2ms \
            git /repo --stdout-format sarif \
            --report-path /repo/artifacts/2ms.sarif \
            --ignore-on-exit results

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: artifacts/2ms.sarif

      - name: Upload 2ms results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 2ms-results-${{ github.run_id }}
          path: artifacts/
